upstream auth_service {
    server auth-service:8000;
}

upstream clients_service {
    server clients-service:8000;
}

upstream services_service {
    server services-service:8000;
}

upstream travel_service {
    server travel-service:8000;
}

upstream orders_service {
    server orders-service:8000;
}

upstream payments_service {
    server payments-service:8000;
}

upstream partners_service {
    server partners-service:8000;
}

server {
    listen 80;
    server_name localhost;

    # Максимальный размер тела запроса
    client_max_body_size 10M;

    # ============================================================
    # Блокировка внутренних эндпоинтов (доступны только внутри Docker-сети)
    # ============================================================
    location /api/clients/internal/ {
        return 403;
    }

    location /api/orders/internal/ {
        return 403;
    }

    # ============================================================
    # Auth Service
    # ============================================================
    location /api/auth/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            return 204;
        }

        proxy_pass http://auth_service/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ============================================================
    # Clients Service
    # ============================================================
    location /api/clients/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            return 204;
        }

        proxy_pass http://clients_service/clients/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ============================================================
    # Services Service
    # ============================================================
