upstream auth_service {
    server auth-service:8000;
}

upstream clients_service {
    server clients-service:8000;
}

upstream services_service {
    server services-service:8000;
}

upstream travel_service {
    server travel-service:8000;
}

upstream orders_service {
    server orders-service:8000;
}

upstream payments_service {
    server payments-service:8000;
}

upstream partners_service {
    server partners-service:8000;
}

server {
    listen 80;
    server_name localhost;

    # Максимальный размер тела запроса
    client_max_body_size 10M;

    # CORS заголовки
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Обработка preflight запросов
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Auth Service
    location /api/auth/ {
        proxy_pass http://auth_service/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Clients Service
    location /api/clients/ {
        proxy_pass http://clients_service/clients/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Services Service
    location /api/services/ {
        proxy_pass http://services_service/services/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Travel Service
    location /api/travel/ {
        proxy_pass http://travel_service/travel/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Orders Service
    location /api/orders/ {
        proxy_pass http://orders_service/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Payments Service
    location /api/payments/ {
        proxy_pass http://payments_service/payments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Partners Service
    location /api/partners/ {
        proxy_pass http://partners_service/partners/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Health check
    location /health {
        return 200 '{"status": "ok"}';
        add_header Content-Type application/json;
    }
}
